name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: master
  schedule:
  - cron: "0 0 * * *"

jobs:
  website:
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - name: Restore publication cache
      uses: actions/cache@v4
      with:
        path: _cache
        key: ${{ runner.os }}-_cache-${{ hashFiles('_data/publications/*.yml') }}

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    # Disabled for now, plugins come from IRIS-HEP
    - name: Check RuboCop
      run: bundle exec rake rubocop || true

    - name: Build the site
      run: bundle exec rake build
      env:
        JEKYLL_ENV: production

    - name: Check for issues
      run: bundle exec rake checkonly || true

    - name: Write new README for output repo
      run: |
        echo "# WARNING: Do not edit this generated repository; edit [clariphy.github.io-source](https://github.com/clariphy/clariphy.github.io-source) instead!" > _site/README.md
    
    - name: Deploy
      if: success() && github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
      uses: peaceiris/actions-gh-pages@v3
      with:
        deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        external_repository: clariphy/clariphy.github.io
        publish_branch: master
        publish_dir: _site
        force_orphan: true
        cname: clariphy.org
